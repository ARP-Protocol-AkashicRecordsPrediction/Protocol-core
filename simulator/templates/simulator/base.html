<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Social Prediction Simulator{% endblock %}</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --ink: #111827;
      --muted: #667085;
      --line: #d7dce3;
      --accent: #155eef;
      --accent-soft: #eaf1ff;
      --danger: #b42318;
      --ok: #067647;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    a { color: inherit; text-decoration: none; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 248px 1fr; }
    .sidebar {
      background: #111827;
      color: #f9fafb;
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .brand { font-size: 18px; font-weight: 760; line-height: 1.1; }
    .nav { display: grid; gap: 8px; }
    .nav a {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 10px 12px;
      color: #d0d5dd;
      font-weight: 650;
    }
    .nav a:hover { background: rgba(255,255,255,.08); color: #fff; }
    .main { padding: 28px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 22px;
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.16; letter-spacing: 0; }
    h2 { margin: 0 0 14px; font-size: 17px; letter-spacing: 0; }
    h3 { margin: 0; font-size: 15px; letter-spacing: 0; }
    .muted { color: var(--muted); }
    .grid { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; gap: 18px; align-items: start; }
    .stack { display: grid; gap: 14px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(16,24,40,.04);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding: 13px 0;
    }
    .row:first-child { border-top: 0; padding-top: 0; }
    .row:last-child { padding-bottom: 0; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; color: var(--muted); font-size: 12px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 2px 8px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .status-pending { color: #6941c6; background: #f4f3ff; border-color: #d9d6fe; }
    .status-running { color: #175cd3; background: #eff8ff; border-color: #b2ddff; }
    .status-completed { color: var(--ok); background: #ecfdf3; border-color: #abefc6; }
    .status-failed { color: var(--danger); background: #fef3f2; border-color: #fecdca; }
    label { display: grid; gap: 6px; color: #344054; font-size: 13px; font-weight: 700; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #cfd5dd;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      font: inherit;
    }
    textarea { min-height: 94px; resize: vertical; }
    .form-grid { display: grid; gap: 12px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px 12px;
      font-weight: 760;
      cursor: pointer;
      text-align: center;
    }
    .button.secondary { background: var(--accent-soft); color: var(--accent); }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      background: #fbfcfd;
    }
    pre {
      overflow: auto;
      background: #101828;
      color: #f9fafb;
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .grid, .split { grid-template-columns: 1fr; }
      .main { padding: 20px; }
      .topbar { display: grid; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <a class="brand" href="{% url 'ui-dashboard' %}">Social Prediction Simulator</a>
      <nav class="nav">
        <a href="{% url 'ui-dashboard' %}">Dashboard</a>
        <a href="/api/">API</a>
        <a href="/admin/">Admin</a>
      </nav>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
